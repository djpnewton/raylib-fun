<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>raylib-fun</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
      #canvas { display: block; max-width: 100%; max-height: 100vh; width: auto; height: auto; }
      #status { color: #aaa; font-family: monospace; margin-top: 8px; font-size: 14px; min-height: 1.2em; }
    </style>
  </head>
  <body>
    <canvas id="canvas" tabindex="-1"></canvas>
    <div id="status">Loading...</div>
    <script>
      var statusEl = document.getElementById('status');
      var Module = {
        canvas: document.getElementById('canvas'),
        setStatus: function(text) {
          statusEl.textContent = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left
            ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
            : '');
        },
      };
      window.onerror = function(msg) {
        statusEl.textContent = 'Error: ' + msg;
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
