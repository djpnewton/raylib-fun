name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Patch Zig 0.16.0 emscripten stdlib bug (STOPSIG wrong return type)
        run: |
          ZIG_STD_DIR="$(dirname $(which zig))/lib/std"
          sed -i 's/pub fn STOPSIG(s: u32) u32/pub fn STOPSIG(s: u32) SIG/' "$ZIG_STD_DIR/os/emscripten.zig"

      - name: Cache Zig packages and emsdk
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-

      - name: Build for web
        run: zig build -Dtarget=wasm32-emscripten -Doptimize=ReleaseSmall

      - name: Cache-bust JS reference in HTML
        run: sed -i "s/raylib_fun\.js/raylib_fun.js?v=$(date -u +%Y%m%d%H%M%S)/g" zig-out/web/raylib_fun.html

      - name: copy to index.html
        run: cp zig-out/web/raylib_fun.html zig-out/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: zig-out/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
